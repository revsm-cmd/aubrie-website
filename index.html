<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacKenzie — aubrie.ca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet" />
  <style>
    /* ── Ancient MacKenzie Tartan palette ── */
    :root {
      --green:   #1a3a2a;
      --green-mid: #24523c;
      --navy:    #0d1f3c;
      --red:     #8b1a1a;
      --gold:    #c9a84c;
      --cream:   #f0e9d6;
      --muted:   #9aa8a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--navy);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ── Tartan background pattern ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(90deg, transparent 0px, transparent 28px, rgba(26,58,42,0.55) 28px, rgba(26,58,42,0.55) 56px, transparent 56px, transparent 72px, rgba(26,58,42,0.35) 72px, rgba(26,58,42,0.35) 80px),
        repeating-linear-gradient(180deg, transparent 0px, transparent 28px, rgba(26,58,42,0.55) 28px, rgba(26,58,42,0.55) 56px, transparent 56px, transparent 72px, rgba(26,58,42,0.35) 72px, rgba(26,58,42,0.35) 80px),
        repeating-linear-gradient(90deg, rgba(13,31,60,0.8) 0px, rgba(13,31,60,0.8) 80px),
        repeating-linear-gradient(90deg, transparent 0px, transparent 52px, rgba(139,26,26,0.4) 52px, rgba(139,26,26,0.4) 56px),
        repeating-linear-gradient(180deg, transparent 0px, transparent 52px, rgba(139,26,26,0.4) 52px, rgba(139,26,26,0.4) 56px),
        repeating-linear-gradient(90deg, transparent 0px, transparent 38px, rgba(201,168,76,0.3) 38px, rgba(201,168,76,0.3) 40px),
        repeating-linear-gradient(180deg, transparent 0px, transparent 38px, rgba(201,168,76,0.3) 38px, rgba(201,168,76,0.3) 40px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Vignette overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(5,10,20,0.75) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Main container ── */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 680px;
      width: 100%;
    }

    /* ── Top rule with gold ── */
    .rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .rule::before, .rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .rule-diamond {
      width: 8px;
      height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.8;
    }

    /* ── Monogram ── */
    .monogram {
      font-family: 'IM Fell English SC', serif;
      font-size: clamp(3.5rem, 10vw, 6rem);
      color: var(--gold);
      letter-spacing: 0.15em;
      line-height: 1;
      margin-bottom: 0.25rem;
      text-shadow: 0 2px 24px rgba(201,168,76,0.25);
    }

    /* ── Family name ── */
    .family-name {
      font-family: 'IM Fell English SC', serif;
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      letter-spacing: 0.45em;
      color: var(--cream);
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 2rem;
    }

    /* ── Divider ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      margin: 0 auto 2rem;
    }

    /* ── Motto ── */
    .motto {
      font-size: clamp(1.05rem, 2.8vw, 1.3rem);
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
    }

    /* ── Domain note ── */
    .domain-note {
      font-size: clamp(0.8rem, 2vw, 0.92rem);
      letter-spacing: 0.12em;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }
    .domain-note strong {
      color: var(--cream);
      font-weight: 400;
    }

    /* ── Contact ── */
    .contact a {
      font-family: 'IM Fell English SC', serif;
      font-size: clamp(0.85rem, 2.2vw, 1rem);
      letter-spacing: 0.2em;
      color: var(--gold);
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.3s;
    }
    .contact a:hover { opacity: 1; }

    /* ── Bottom rule ── */
    .rule-bottom { margin-top: 2.5rem; }

    /* ── Footer ── */
    .footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.45;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="rule"><div class="rule-diamond"></div></div>

    <div class="monogram">M</div>
    <div class="family-name">MacKenzie</div>

    <div class="divider"></div>

    <div class="motto">Luceo Non Uro</div>

    <div class="domain-note">
      <strong>aubrie.ca</strong> is a private family domain.<br />
      It is not affiliated with any business or organisation.
    </div>

    <div class="contact">
      <a href="mailto:scott@aubrie.ca">scott@aubrie.ca</a>
    </div>

    <div class="rule rule-bottom"><div class="rule-diamond"></div></div>

    <div class="footer">Est. 20212 &nbsp;&middot;&nbsp; aubrie.ca &nbsp;&middot;&nbsp; Private</div>

  </div>
</body>
</html>
